version: '3.8'
services:
  event-gateway:
    build: ./event-gateway
    ports:
      - "8080:8080"
    environment:
      - ACCOUNT_SERVICE_URL=http://account-service:8081
    depends_on:
      - account-service
    networks:
      - ledger-net

  account-service:
    build: ./account-service
    ports:
      - "8081:8081"
    networks:
      - ledger-net

networks:
  ledger-net:
    driver: bridge